name: Build pi-cam image

on:
  push:
    branches: [bookworm-arm64]
    tags: ['v*']
  pull_request:
    branches: [bookworm-arm64]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120

    permissions:
      contents: write  # needed to publish a GitHub Release on tag pushes

    env:
      IMG_NAME: meltingplot-pi-cam
      RELEASE: bookworm
      DEPLOY_COMPRESSION: xz
      COMPRESSION_LEVEL: 6
      ENABLE_SSH: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pi-gen build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            coreutils quilt parted qemu-user-binfmt debootstrap zerofree zip \
            dosfstools e2fsprogs libarchive-tools libcap2-bin grep rsync xz-utils \
            file git curl bc gpg pigz xxd arch-test bmap-tools kmod

      - name: Write pi-gen config
        run: |
          cat > config <<EOF
          IMG_NAME='${IMG_NAME}'
          RELEASE='${RELEASE}'
          DEPLOY_COMPRESSION='${DEPLOY_COMPRESSION}'
          COMPRESSION_LEVEL='${COMPRESSION_LEVEL}'
          ENABLE_SSH='${ENABLE_SSH}'
          STAGE_LIST='stage0 stage1 stage2'
          EOF

      - name: Build image with pi-gen
        run: sudo ./build.sh

      - name: Fix deploy/ and work/ ownership
        run: sudo chown -R "$(id -u):$(id -g)" deploy/ work/

      - name: Compute image version ({codename}-{date}-{cam})
        id: ver
        run: |
          set -euo pipefail
          # Match the Raspberry Pi OS naming convention: codename + release date.
          # The source rootfs (stage2) is the durable copy of the rootfs;
          # work/.../export-image/rootfs is a loop mount that build.sh
          # unmounts on exit.
          rootfs="work/${IMG_NAME}/stage2/rootfs"
          codename="$(. "$rootfs/etc/os-release" && echo "$VERSION_CODENAME")"
          [ -n "$codename" ] || { echo "VERSION_CODENAME not found in os-release" >&2; exit 1; }
          release_date="$(date -u +%Y-%m-%d)"
          cam="$(cat stage2/05-rpi-camera/files/rpi-camera-version)"
          version="${codename}-${release_date}-${cam}"
          echo "Image version: $version"
          {
            echo "version=$version"
            echo "codename=$codename"
            echo "release_date=$release_date"
            echo "cam=$cam"
          } >> "$GITHUB_OUTPUT"
          {
            echo "### Image version"
            echo ""
            echo "| component | value |"
            echo "| --- | --- |"
            echo "| debian codename | \`$codename\` |"
            echo "| release date | \`$release_date\` |"
            echo "| meltingplot.rpi_camera | \`$cam\` |"
            echo "| **combined** | \`$version\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Produce per-model copies (rpi4, rpi5, zero2w)
        id: copies
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          src="$(ls deploy/*-lite.img.xz | head -n1)"
          base="${IMG_NAME}-${VERSION}"
          echo "Renaming $src -> ${base}-{rpi4,rpi5,zero2w}.img.xz"
          mkdir -p artifacts
          for model in rpi4 rpi5 zero2w; do
            out="artifacts/${base}-${model}.img.xz"
            cp -v "$src" "$out"
            sha256sum "$out" > "${out}.sha256"
          done
          ls -lah artifacts/
          echo "base=$base" >> "$GITHUB_OUTPUT"

      - name: Upload rpi4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.copies.outputs.base }}-rpi4
          path: artifacts/*-rpi4.img.xz*
          if-no-files-found: error

      - name: Upload rpi5 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.copies.outputs.base }}-rpi5
          path: artifacts/*-rpi5.img.xz*
          if-no-files-found: error

      - name: Upload zero2w artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.copies.outputs.base }}-zero2w
          path: artifacts/*-zero2w.img.xz*
          if-no-files-found: error

      # ---- Release publishing (tag pushes only) ----------------------------

      - name: Compute sizes and SHAs for the Imager catalog
        id: catalog
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          # All three model copies are byte-identical, so compute on one
          img="$(ls artifacts/*-rpi4.img.xz | head -n1)"
          extract_size="$(xz --robot --list "$img" | awk '/^totals/ {print $5}')"
          extract_sha256="$(xz -dc "$img" | sha256sum | awk '{print $1}')"
          download_size="$(stat -c%s "$img")"
          download_sha256="$(sha256sum "$img" | awk '{print $1}')"
          {
            echo "extract_size=$extract_size"
            echo "extract_sha256=$extract_sha256"
            echo "download_size=$download_size"
            echo "download_sha256=$download_sha256"
          } >> "$GITHUB_OUTPUT"

      - name: Generate os_list.json (Imager v4 catalog)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          BASE: ${{ steps.copies.outputs.base }}
          RELEASE_DATE: ${{ steps.ver.outputs.release_date }}
          EXTRACT_SIZE: ${{ steps.catalog.outputs.extract_size }}
          EXTRACT_SHA256: ${{ steps.catalog.outputs.extract_sha256 }}
          DOWNLOAD_SIZE: ${{ steps.catalog.outputs.download_size }}
          DOWNLOAD_SHA256: ${{ steps.catalog.outputs.download_sha256 }}
        run: |
          set -euo pipefail
          # Pin URLs inside the catalog to this tag so a downloaded
          # catalog cannot reference assets that disappear under it.
          # The catalog itself is published at the same tag and also
          # reachable via releases/latest/download/os_list.json.
          export REPO_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"
          python3 - <<'PY' > artifacts/os_list.json
          import json, os
          version       = os.environ["VERSION"]
          base          = os.environ["BASE"]
          ext_size      = int(os.environ["EXTRACT_SIZE"])
          ext_sha       = os.environ["EXTRACT_SHA256"]
          dl_size       = int(os.environ["DOWNLOAD_SIZE"])
          dl_sha        = os.environ["DOWNLOAD_SHA256"]
          release_date  = os.environ["RELEASE_DATE"]
          repo_url      = os.environ["REPO_URL"]

          def subitem(model_label, model_slug, devices, chip_note):
              return {
                  "name": f"Meltingplot Pi Camera ({model_label})",
                  "description": f"Headless meltingplot.rpi_camera image for {model_label} ({chip_note}). Version {version}.",
                  "url": f"{repo_url}/{base}-{model_slug}.img.xz",
                  "extract_size": ext_size,
                  "extract_sha256": ext_sha,
                  "image_download_size": dl_size,
                  "image_download_sha256": dl_sha,
                  "release_date": release_date,
                  "init_format": "systemd",
                  "devices": devices,
              }

          catalog = {
              "os_list": [
                  {
                      "name": "Meltingplot Pi Camera",
                      "description": (
                          "Headless Raspberry Pi camera image bundling Debian bookworm, "
                          "the Raspberry Pi v8 kernel and meltingplot.rpi_camera "
                          f"(image version {version})."
                      ),
                      "subitems": [
                          subitem("Pi 5",        "rpi5",   ["pi5-64bit"], "BCM2712"),
                          subitem("Pi 4",        "rpi4",   ["pi4-64bit"], "BCM2711"),
                          subitem("Pi Zero 2W",  "zero2w", ["pi3-64bit"], "BCM2710A1, shares the Pi 3 device class"),
                      ],
                  }
              ]
          }
          print(json.dumps(catalog, indent=2))
          PY
          cat artifacts/os_list.json

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.img.xz
            artifacts/*.img.xz.sha256
            artifacts/os_list.json
          generate_release_notes: true
          body: |
            ## Image version

            `${{ steps.ver.outputs.version }}`

            ## Use with Raspberry Pi Imager

            Launch Imager with this repository's catalog so customization
            (WiFi, SSH, user, hostname, locale) is available in the wizard:

            ```
            rpi-imager --repo https://github.com/${{ github.repository }}/releases/latest/download/os_list.json
            ```

            Then pick **Meltingplot Pi Camera** and choose the entry that
            matches your board.

            (Picking the `.img.xz` file directly via "Use Custom" works for
            flashing but disables Imager's customization wizard - that is
            a deliberate behaviour of Imager, not a property of the image.)
