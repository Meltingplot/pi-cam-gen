name: Build pi-cam image

on:
  push:
    branches: [arm64]
    tags: ['v*']
  pull_request:
    branches: [arm64]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120

    env:
      IMG_NAME: meltingplot-pi-cam
      RELEASE: trixie
      DEPLOY_COMPRESSION: xz
      COMPRESSION_LEVEL: 6
      ENABLE_SSH: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pi-gen build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            coreutils quilt parted qemu-user-binfmt debootstrap zerofree zip \
            dosfstools e2fsprogs libarchive-tools libcap2-bin grep rsync xz-utils \
            file git curl bc gpg pigz xxd arch-test bmap-tools kmod

      - name: Write pi-gen config
        run: |
          cat > config <<EOF
          IMG_NAME='${IMG_NAME}'
          RELEASE='${RELEASE}'
          DEPLOY_COMPRESSION='${DEPLOY_COMPRESSION}'
          COMPRESSION_LEVEL='${COMPRESSION_LEVEL}'
          ENABLE_SSH='${ENABLE_SSH}'
          STAGE_LIST='stage0 stage1 stage2'
          EOF

      - name: Build image with pi-gen
        run: sudo ./build.sh

      - name: Fix deploy/ and work/ ownership
        run: sudo chown -R "$(id -u):$(id -g)" deploy/ work/

      - name: Compute image version (debian-kernel-cam)
        id: ver
        run: |
          set -euo pipefail
          # Use the source rootfs (stage2), not work/.../export-image/rootfs
          # which is the image's loop mount and is empty after build.sh's
          # exit trap unmounts it.
          rootfs="work/${IMG_NAME}/stage2/rootfs"
          # Debian major release (e.g. 13 for trixie)
          debian="$(. "$rootfs/etc/os-release" && echo "$VERSION_ID")"
          # Kernel package version; strip epoch ("1:") and swap '+' for '-' so it's filename-safe
          kernel_raw="$(awk '/^Package: linux-image-rpi-v8$/,/^$/ { if (/^Version: /) { print $2; exit } }' \
            "$rootfs/var/lib/dpkg/status")"
          [ -n "$kernel_raw" ] || { echo "linux-image-rpi-v8 not found in rootfs dpkg status" >&2; exit 1; }
          kernel="$(echo "$kernel_raw" | sed -e 's/^[0-9]*://' -e 's/+/-/g')"
          # rpi-camera pin (tracked in repo, kept in sync by check-rpi-camera-version.yml)
          cam="$(cat stage2/05-rpi-camera/files/rpi-camera-version)"
          version="${debian}-${kernel}-${cam}"
          echo "Image version: $version (debian=$debian kernel=$kernel cam=$cam)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          {
            echo "### Image version"
            echo ""
            echo "| component | value |"
            echo "| --- | --- |"
            echo "| debian | \`$debian\` |"
            echo "| kernel (linux-image-rpi-v8) | \`$kernel\` (raw: \`$kernel_raw\`) |"
            echo "| meltingplot.rpi_camera | \`$cam\` |"
            echo "| **combined** | \`$version\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Produce per-model copies (rpi4, rpi5, zero2w)
        id: copies
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          src="$(ls deploy/*-lite.img.xz | head -n1)"
          base="${IMG_NAME}-${VERSION}"
          echo "Renaming $src -> ${base}-{rpi4,rpi5,zero2w}.img.xz"
          mkdir -p artifacts
          for model in rpi4 rpi5 zero2w; do
            out="artifacts/${base}-${model}.img.xz"
            cp -v "$src" "$out"
            sha256sum "$out" > "${out}.sha256"
          done
          ls -lah artifacts/
          echo "base=$base" >> "$GITHUB_OUTPUT"

      - name: Upload rpi4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.copies.outputs.base }}-rpi4
          path: artifacts/*-rpi4.img.xz*
          if-no-files-found: error

      - name: Upload rpi5 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.copies.outputs.base }}-rpi5
          path: artifacts/*-rpi5.img.xz*
          if-no-files-found: error

      - name: Upload zero2w artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.copies.outputs.base }}-zero2w
          path: artifacts/*-zero2w.img.xz*
          if-no-files-found: error
