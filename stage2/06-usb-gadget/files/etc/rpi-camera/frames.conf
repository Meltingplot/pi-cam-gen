# Per-board capture / UVC frame sets — the SINGLE source of truth for BOTH:
#   * the USB UVC gadget descriptors (rpi-cam-gadget-setup.sh, when UVC is
#     enabled), and
#   * the rpi-camera web UI capture-resolution list (the IP-camera MJPEG/HTTP
#     stream).
# Kept here (NOT configfs) because the UVC function is off by default, so
# configfs has no frames to read.
#
# Format:  <key>|WxH:fps,fps,...|WxH:fps,...|...
#   * The first line whose <key> is a substring of /proc/device-tree/model
#     wins; '*' matches any board. Order matters — most specific first.
#   * Resolutions ascending (the order IS the UVC bFrameIndex).
#   * fps list: the gadget advertises all of them; the web UI uses only the
#     WxH set (frame rate is its own 1-30 slider). 1080p, where present, is the
#     default capture/gadget frame (must match server._default_resolution).
Zero 2|640x480:30,24,20,15,10,5|1280x720:30,24,20,15,10,5|1920x1080:24,20,15,10,5|2304x1296:20,15,10,5
Zero|640x480:20,15,10,5|1280x720:20,15,10,5
