# Force NetworkManager to manage the USB-gadget network interface (usb0).
#
# Depending on the NM defaults (a globally-managed-devices rule, another tool
# claiming the device, or NM treating the gadget interface as external), usb0
# is left UNMANAGED — so the usb0-host connection profile never activates and
# the attached USB host gets no DHCP lease over CDC-NCM. Marking it explicitly
# managed lets the shared-mode profile (10.55.0.1/24 + NM's internal dnsmasq,
# see system-connections/usb0-host.nmconnection) come up on boot.
[device-usb0]
match-device=interface-name:usb0
managed=1
