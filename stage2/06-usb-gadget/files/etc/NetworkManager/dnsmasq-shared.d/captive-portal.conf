# Captive portal on usb0 (NetworkManager shared-mode dnsmasq reads this dir).
#
# Point the OS connectivity-check hosts at this Pi (10.55.0.1, the usb0
# shared-mode address — must match usb0-host.nmconnection). A connected host
# then sees its probe redirected and flags a captive portal, popping up a
# "Sign in to network" notification that opens the webcam UI. Only these probe
# domains are hijacked — every other name is still forwarded upstream, so the
# host's real network (WiFi/Ethernet) keeps working.
#
# The matching probe PATHS are answered with a 302 to the UI by rpi-camera's
# HTTP server (_CAPTIVE_PROBE_PATHS in server.py); that 302 (instead of the
# expected success body) is what trips the host's captive-portal detection.
address=/www.msftconnecttest.com/10.55.0.1
address=/www.msftncsi.com/10.55.0.1
address=/dns.msftncsi.com/10.55.0.1
address=/captive.apple.com/10.55.0.1
address=/connectivitycheck.gstatic.com/10.55.0.1
address=/clients3.google.com/10.55.0.1

# RFC 8910: also advertise the captive-portal URL via DHCP option 114 for
# clients that read it (Windows leans on the active probe above instead).
dhcp-option=114,http://10.55.0.1/
